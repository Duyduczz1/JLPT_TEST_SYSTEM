{% extends "base.html" %}

{# =========================================================
ログイン後ダッシュボードページ
========================================================= #}

{% block content %}

<!-- ======================================================
     ダッシュボード
     ====================================================== -->
<section class="panel">

  <!-- ユーザーへの挨拶 -->
  <h1>

    こんにちは

    <!-- セッションからユーザー名を取得 -->
    {{ session.get('user_name', 'ユーザー') }}

  </h1>

  <!-- 短い説明 -->
  <p>
    試験を選んで、すぐに開始してください。
  </p>

  <!-- ====================================================
       操作ボタン
       ==================================================== -->
  <div class="actions">

    <!-- レベルを選択 -->
    <a class="button" href="{{ url_for('exam.levels') }}">
      レベルを選ぶ
    </a>

    <!-- 履歴を見る -->
    <a class="button ghost" href="{{ url_for('history.history') }}">
      履歴を見る
    </a>

  </div>

</section>

{% endblock %}
