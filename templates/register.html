{% extends "base.html" %}

{# =========================================================
アカウント登録ページ
========================================================= #}

<!-- ======================================================
     タイトル
     ====================================================== -->
{% block title %}
登録
{% endblock %}

{% block content %}

<!-- ======================================================
     登録フォーム
     ====================================================== -->
<form class="panel form" method="post">

  <!-- Tiêu đề -->
  <h1>
    アカウント作成
  </h1>

  <!-- ====================================================
       氏名入力
       ==================================================== -->
  <label>

    名前

    <input name="name" required>

  </label>

  <!-- ====================================================
       メールアドレス入力
       ==================================================== -->
  <label>

    メールアドレス

    <input type="email" name="email" required>

  </label>

  <!-- ====================================================
       パスワード入力
       minlength="6"
       -> 6文字以上が必要です
       ==================================================== -->
  <label>

    パスワード

    <input type="password" name="password" minlength="6" required>

  </label>

  <!-- ====================================================
       登録ボタン
       ==================================================== -->
  <button class="button" type="submit">
    登録
  </button>

</form>

{% endblock %}
