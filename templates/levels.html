{% extends "base.html" %}

{# =========================================================
Trang chọn cấp độ JLPT
========================================================= #}

{% block content %}

<!-- ======================================================
     TIÊU ĐỀ TRANG
     ====================================================== -->
<h1>
  Chọn cấp độ JLPT
</h1>

<!-- ======================================================
     DANH SÁCH CẤP ĐỘ
     ====================================================== -->
<div class="level-grid">

  <!-- ====================================================
       VÒNG LẶP HIỂN THỊ CÁC CẤP ĐỘ
       Ví dụ:
       N5, N4, N3, N2, N1
       ==================================================== -->
  {% for level in levels %}

  <!-- ================================================
         THẺ CẤP ĐỘ
         Khi bấm sẽ chuyển tới trang chọn bài thi
         ================================================ -->
  <a class="level-card" href="{{ url_for('exam.tests', level=level) }}">

    <!-- Tên cấp độ -->
    <span>
      {{ level }}
    </span>

    <!-- Mô tả nhỏ -->
    <small>
      Practice Test
    </small>

  </a>

  {% endfor %}

</div>

{% endblock %}
