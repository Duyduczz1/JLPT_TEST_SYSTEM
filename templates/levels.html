{% extends "base.html" %}

{# =========================================================
JLPTレベル選択ページ
========================================================= #}

{% block content %}

<!-- ======================================================
     ページタイトル
     ====================================================== -->
<h1>
  JLPTレベルを選択
</h1>

<!-- ======================================================
     レベルリスト
     ====================================================== -->
<div class="level-grid">

  <!-- ====================================================
       レベルカードを表示
       例: N5, N4, N3, N2, N1
       ==================================================== -->
  {% for level in levels %}

  <!-- ================================================
         レベルカード
         クリックすると問題数選択へ移動
         ================================================ -->
  <a class="level-card" href="{{ url_for('exam.tests', level=level) }}">

    <!-- レベル名 -->
    <span>
      {{ level }}
    </span>

    <!-- 小さな説明 -->
    <small>
      練習テスト
    </small>

  </a>

  {% endfor %}

</div>

{% endblock %}
