{% extends "base.html" %}

{# =========================================================
ログインページ
========================================================= #}

<!-- ======================================================
     タイトル
     ====================================================== -->
{% block title %}
ログイン
{% endblock %}

{% block content %}

<!-- ======================================================
     フォーム
     ====================================================== -->
<form class="panel form" method="post">

  <!-- Tiêu đề -->
  <h1>
    ログイン
  </h1>

  <!-- ====================================================
       メールアドレス入力
       ==================================================== -->
  <label>

    メールアドレス

    <input type="email" name="email" required>

  </label>

  <!-- ====================================================
       パスワード入力
       ==================================================== -->
  <label>

    パスワード

    <input type="password" name="password" required>

  </label>

  <!-- ====================================================
       ログインボタン
       ==================================================== -->
  <button class="button" type="submit">
    ログイン
  </button>

  <!-- ====================================================
       登録リンク
       ==================================================== -->
  <p>

    アカウントをお持ちではありませんか？

    <a href="{{ url_for('auth.register') }}">
      登録
    </a>

  </p>

</form>

{% endblock %}
