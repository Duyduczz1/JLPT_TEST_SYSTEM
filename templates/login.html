{% extends "base.html" %}

{# =========================================================
Trang đăng nhập
========================================================= #}

<!-- ======================================================
     TIÊU ĐỀ TAB TRÌNH DUYỆT
     ====================================================== -->
{% block title %}
Đăng nhập
{% endblock %}

{% block content %}

<!-- ======================================================
     FORM ĐĂNG NHẬP
     ====================================================== -->
<form class="panel form" method="post">

  <!-- Tiêu đề -->
  <h1>
    Đăng nhập
  </h1>

  <!-- ====================================================
       Ô NHẬP EMAIL
       ==================================================== -->
  <label>

    Email

    <input type="email" name="email" required>

  </label>

  <!-- ====================================================
       Ô NHẬP MẬT KHẨU
       ==================================================== -->
  <label>

    Mật khẩu

    <input type="password" name="password" required>

  </label>

  <!-- ====================================================
       NÚT ĐĂNG NHẬP
       ==================================================== -->
  <button class="button" type="submit">
    Đăng nhập
  </button>

  <!-- ====================================================
       LINK ĐĂNG KÝ
       ==================================================== -->
  <p>

    Chưa có tài khoản?

    <a href="{{ url_for('auth.register') }}">
      Đăng ký
    </a>

  </p>

</form>

{% endblock %}
